# Self-hosted Infisical for local development.
#
# Base this on Infisical's official self-host compose — the exact image tag and
# env-var names drift between versions, so verify against the current docs:
#   https://infisical.com/docs/self-hosting/deployment-options/docker-compose
#   https://infisical.com/docs/self-hosting/configuration/envars
#
# Bring up:  bun run infisical:up   →  http://localhost:8080

services:
  backend:
    image: infisical/infisical:v0.162.3
    container_name: infisical-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      DB_CONNECTION_URI: "postgres://${INFISICAL_DB_USER:?}:${INFISICAL_DB_PASSWORD:?}@db:5432/${INFISICAL_DB_NAME:?}"
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/status"]
      interval: 10s
      timeout: 5s
      retries: 10

  db:
    image: postgres:16-alpine
    container_name: infisical-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${INFISICAL_DB_USER:?}
      POSTGRES_PASSWORD: ${INFISICAL_DB_PASSWORD:?}
      POSTGRES_DB: ${INFISICAL_DB_NAME:?}
    volumes:
      - infisical-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INFISICAL_DB_USER:?}"]
      interval: 5s

  redis:
    image: redis:7-alpine
    container_name: infisical-redis
    restart: unless-stopped
    volumes:
      - infisical-redis:/data

volumes:
  infisical-db:
  infisical-redis:
