services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: meow
      POSTGRES_PASSWORD: meow
      POSTGRES_DB: meow
    ports:
      - "5432:5432"
    volumes:
      # postgres:18+ images moved the volume from /var/lib/postgresql/data
      # to /var/lib/postgresql (PGDATA is version-scoped under it).
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meow"]
      interval: 5s

volumes:
  db-data:
