services:
  db:
    image: postgres:18-alpine
    # Creds come from database/.env (written by `bun run secrets:pull:db` from the
    # meow-platform Infisical project). Compose auto-loads that .env for ${VAR}
    # substitution, so the container and the app share ONE source of truth.
    # The :-meow defaults keep `db:up` working before Infisical is populated.
    environment:
      POSTGRES_USER: ${PSQL_USER:-meow}
      POSTGRES_PASSWORD: ${PSQL_PASSWORD:-meow}
      POSTGRES_DB: ${PSQL_DB:-meow}
    ports:
      - "${PSQL_PORT:-5432}:5432"
    volumes:
      # postgres:18+ images moved the volume from /var/lib/postgresql/data
      # to /var/lib/postgresql (PGDATA is version-scoped under it).
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PSQL_USER:-meow}"]
      interval: 5s

volumes:
  db-data:
