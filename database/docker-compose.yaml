services:
  db:
    image: postgres:18-alpine
    # Creds come from database/.env (written by `bun run secret:pull:db` from the
    # meow-platform Infisical project). Compose auto-loads that .env for ${VAR}
    # substitution, so the container and the app share ONE source of truth.
    # No fallbacks — ${VAR:?} makes Compose refuse to start if a value is unset.
    environment:
      POSTGRES_USER: ${PSQL_USER:?}
      POSTGRES_PASSWORD: ${PSQL_PASSWORD:?}
      POSTGRES_DB: ${PSQL_DB:?}
    ports:
      - "${PSQL_PORT:?}:5432"
    volumes:
      # postgres:18+ images moved the volume from /var/lib/postgresql/data
      # to /var/lib/postgresql (PGDATA is version-scoped under it).
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PSQL_USER:?}"]
      interval: 5s

volumes:
  db-data:
